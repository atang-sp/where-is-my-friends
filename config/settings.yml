plugins:
  where_is_my_friends_enabled:
    default: true
    client: true
    type: bool
    description: "启用附近的朋友插件"
    category: "where_is_my_friends"
    translated: true

  where_is_my_friends_enable_virtual_location:
    default: true
    client: true
    type: bool
    description: "启用虚拟定位功能，允许用户在地图上选择位置"
    category: "where_is_my_friends"
    translated: true

  where_is_my_friends_map_provider:
    default: "openstreetmap"
    client: true
    type: enum
    choices:
      - amap
      - baidu
      - openstreetmap
    description: "地图服务提供商 (amap: 高德地图, baidu: 百度地图, openstreetmap: 开源地图)"
    category: "where_is_my_friends"
    translated: true

  where_is_my_friends_amap_api_key:
    default: ""
    type: string
    description: "高德地图浏览器API密钥（必须限制到论坛域名）"
    category: "where_is_my_friends"
    translated: true

  where_is_my_friends_baidu_api_key:
    default: ""
    type: string
    description: "百度地图浏览器API密钥（必须限制到论坛域名）"
    category: "where_is_my_friends"
    translated: true

  where_is_my_friends_max_users_display:
    default: 50
    min: 10
    max: 200
    client: true
    type: integer
    description: "附近用户列表的最大显示数量"
    category: "where_is_my_friends"
    translated: true

  where_is_my_friends_location_ttl_days:
    default: 30
    min: 1
    max: 365
    type: integer
    description: "位置在多少天后自动过期并删除"
    category: "where_is_my_friends"
    translated: true

  where_is_my_friends_aggregate_privacy_threshold:
    default: 3
    min: 2
    max: 20
    type: integer
    description: "显示精确活跃人数所需的最少用户数"
    category: "where_is_my_friends"
    translated: true

  where_is_my_friends_seed_cities:
    default: ""
    type: string
    description: "推荐城市列表，用竖线分隔（如 上海|北京|深圳|New York|Tokyo）"
    category: "where_is_my_friends"
    translated: true

  where_is_my_friends_default_discovery_radius_km:
    default: 100
    min: 20
    max: 500
    client: true
    type: integer
    description: "默认发现半径（公里）。用户可在 50/100/200 中自选。"
    category: "where_is_my_friends"
    translated: true
